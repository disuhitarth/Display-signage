[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# Redirect all requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/display/*"
  to = "/.netlify/functions/api/display/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "/.netlify/functions/api/login"
  status = 200
  force = true

# SPA fallback for root
[[redirects]]
  from = "/"
  to = "/.netlify/functions/api/"
  status = 200
  force = true

[dev]
  command = "npm start"
  port = 8888
  targetPort = 3000
